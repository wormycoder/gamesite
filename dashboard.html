<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com wss://*.firebaseio.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Game Site</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 4px; flex-shrink: 0; }
    .sidebar .logo { font-size: 20px; font-weight: 700; color: #6c47ff; margin-bottom: 1.5rem; padding-left: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #aaa; transition: all 0.2s; text-decoration: none; }
    .nav-btn:hover { background: #252525; color: #fff; }
    .nav-btn.active { background: #6c47ff22; color: #6c47ff; font-weight: 500; }
    .nav-btn .icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-bottom { margin-top: auto; }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: #111; }
    .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: #6c47ff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .user-pill .name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { font-size: 12px; color: #555; cursor: pointer; }
    .logout-btn:hover { color: #ff6b6b; }
    .main { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 1.5rem; }
    .section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.2rem; }
    .section-head { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #ccc; }
    .request-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222; }
    .request-item:last-child { border-bottom: none; }
    .req-av { width: 36px; height: 36px; border-radius: 50%; background: #6c47ff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .req-name { flex: 1; font-size: 14px; font-weight: 500; }
    .req-time { font-size: 12px; color: #555; }
    .btn-sm { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: 'Inter', sans-serif; }
    .btn-accept { background: #6c47ff; color: #fff; margin-right: 6px; }
    .btn-decline { background: #2a2a2a; color: #aaa; }
    .invite-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222; }
    .invite-item:last-child { border-bottom: none; }
    .invite-info { flex: 1; }
    .invite-info .iname { font-size: 14px; font-weight: 500; }
    .invite-info .igame { font-size: 12px; color: #6c47ff; margin-top: 2px; }
    .empty-msg { font-size: 13px; color: #444; text-align: center; padding: 1rem 0; }
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input { flex: 1; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 9px 14px; font-size: 14px; color: #fff; font-family: 'Inter', sans-serif; outline: none; }
    .search-row input:focus { border-color: #6c47ff; }
    .search-row button { background: #6c47ff; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
    .search-result { display: flex; align-items: center; gap: 12px; padding: 10px; background: #111; border-radius: 8px; }
    .search-result .sname { flex: 1; font-size: 14px; font-weight: 500; }
    .msg { font-size: 13px; margin-top: 8px; color: #6c47ff; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">GameSite</div>
  <a href="index.html" class="nav-btn"><span class="icon">🎮</span> Games</a>
  <a href="dashboard.html" class="nav-btn active"><span class="icon">📬</span> Dashboard</a>
  <a href="profile.html" class="nav-btn"><span class="icon">👤</span> Profile</a>
  <a href="costume.html" class="nav-btn"><span class="icon">🎨</span> Costume</a>
  <a href="settings.html" class="nav-btn"><span class="icon">⚙️</span> Settings</a>
  <div class="sidebar-bottom">
    <div class="user-pill">
      <div class="avatar-sm" id="sidebar-avatar">?</div>
      <span class="name" id="sidebar-name">Loading...</span>
      <span class="logout-btn" onclick="handleLogout()">Out</span>
    </div>
  </div>
</div>
<div class="main">
  <p class="page-title">Dashboard</p>

  <!-- Add friend -->
  <div class="section">
    <p class="section-head">Add a friend</p>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search by username...">
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="search-result"></div>
    <div id="search-msg" class="msg"></div>
  </div>

  <!-- Friend requests -->
  <div class="section">
    <p class="section-head">Friend requests</p>
    <div id="requests-list"><p class="empty-msg">No pending requests</p></div>
  </div>

  <!-- Saved invites -->
  <div class="section">
    <p class="section-head">Game invites inbox</p>
    <div id="invites-list"><p class="empty-msg">No saved invites</p></div>
  </div>
</div>

<script type="module">
  import { watchAuth, logout } from "./auth.js";
  import { setOnline } from "./presence.js";
  import { searchUser, sendFriendRequest, getFriendRequests, acceptFriendRequest, declineFriendRequest } from "./friends.js";
  import { db } from "./firebase.js";
  import { collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let currentUser = null;
  let searchedUser = null;

  watchAuth(async (user) => {
    currentUser = user;
    document.getElementById("sidebar-avatar").textContent = (user.displayName || "?")[0].toUpperCase();
    document.getElementById("sidebar-name").textContent = user.displayName || user.email;
    await setOnline(user.uid);
    loadRequests(user.uid);
    loadInvites(user.uid);
  }, () => { window.location.href = "login.html"; });

  window.doSearch = async function() {
    const username = document.getElementById("search-input").value.trim();
    const resultDiv = document.getElementById("search-result");
    const msgDiv = document.getElementById("search-msg");
    resultDiv.innerHTML = "";
    msgDiv.textContent = "";
    if (!username) return;
    const found = await searchUser(username);
    if (!found) { msgDiv.textContent = "No user found with that username."; return; }
    if (found.uid === currentUser.uid) { msgDiv.textContent = "That's you!"; return; }
    searchedUser = found;
    resultDiv.innerHTML = `
      <div class="search-result">
        <div class="req-av">${found.username[0].toUpperCase()}</div>
        <span class="sname">${found.username}</span>
        <button class="btn-sm btn-accept" onclick="sendRequest()">Add friend</button>
      </div>`;
  };

  window.sendRequest = async function() {
    if (!searchedUser || !currentUser) return;
    const result = await sendFriendRequest(currentUser.uid, currentUser.displayName, searchedUser.uid);
    document.getElementById("search-msg").textContent = result.message || (result.success ? "Friend request sent!" : "Error sending request.");
    document.getElementById("search-result").innerHTML = "";
  };

  async function loadRequests(uid) {
    const requests = await getFriendRequests(uid);
    const list = document.getElementById("requests-list");
    if (requests.length === 0) { list.innerHTML = '<p class="empty-msg">No pending requests</p>'; return; }
    list.innerHTML = requests.map(r => `
      <div class="request-item">
        <div class="req-av">${r.fromName[0].toUpperCase()}</div>
        <span class="req-name">${r.fromName}</span>
        <button class="btn-sm btn-accept" onclick="accept('${r.fromUid}', '${r.fromName}')">Accept</button>
        <button class="btn-sm btn-decline" onclick="decline('${r.fromUid}')">Decline</button>
      </div>`).join("");
  }

  window.accept = async function(theirUid, theirName) {
    await acceptFriendRequest(currentUser.uid, currentUser.displayName, theirUid, theirName);
    loadRequests(currentUser.uid);
  };

  window.decline = async function(theirUid) {
    await declineFriendRequest(currentUser.uid, theirUid);
    loadRequests(currentUser.uid);
  };

  function loadInvites(uid) {
    const q = query(collection(db, "users", uid, "invites"), where("status", "==", "pending"));
    onSnapshot(q, (snap) => {
      const list = document.getElementById("invites-list");
      if (snap.empty) { list.innerHTML = '<p class="empty-msg">No saved invites</p>'; return; }
      list.innerHTML = snap.docs.map(d => {
        const inv = d.data();
        return `<div class="invite-item">
          <div class="req-av">${inv.fromName[0].toUpperCase()}</div>
          <div class="invite-info"><p class="iname">${inv.fromName}</p><p class="igame">${inv.gameName}</p></div>
          <button class="btn-sm btn-accept" onclick="joinInvite()">Join</button>
          <button class="btn-sm btn-decline" onclick="dismissInvite('${d.id}', '${uid}')">Dismiss</button>
        </div>`;
      }).join("");
    });
  }

  window.joinInvite = function() { alert("Connect this to your game engine!"); };

  window.dismissInvite = async function(inviteId, uid) {
    await updateDoc(doc(db, "users", uid, "invites", inviteId), { status: "declined" });
  };

  window.handleLogout = logout;
</script>
</body>
</html>
