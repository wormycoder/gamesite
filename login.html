<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com wss://*.firebaseio.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Game Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .site-name {
      font-size: 22px;
      font-weight: 700;
      color: #6c47ff;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .tagline {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 2rem;
    }

    /* Tab switcher between Login and Sign Up */
    .tabs {
      display: flex;
      background: #111;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .tab.active {
      background: #6c47ff;
      color: #fff;
    }

    /* Form fields */
    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #6c47ff; }

    /* Submit button */
    .btn {
      width: 100%;
      background: #6c47ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    .btn:hover { background: #5535dd; }
    .btn:disabled { background: #333; cursor: not-allowed; }

    /* Error / success messages */
    .message {
      text-align: center;
      font-size: 13px;
      margin-top: 1rem;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .message.error { background: #2a1111; color: #ff6b6b; display: block; }
    .message.success { background: #112a1a; color: #6bffaa; display: block; }
  </style>
</head>
<body>

<div class="card">
  <p class="site-name">Game Site</p>
  <p class="tagline">Play games with your friends</p>

  <!-- Tab switcher -->
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Log in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign up</div>
  </div>

  <!-- Username field (signup only) -->
  <div class="field" id="username-field" style="display:none">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a username" maxlength="20">
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@email.com">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn" id="submit-btn" onclick="handleSubmit()">Log in</button>

  <div class="message" id="message"></div>
</div>

<script type="module">
  import { login, signup, watchAuth } from "./js/auth.js";

  let currentTab = "login";

  // If already logged in, send them to the homepage
  watchAuth(
    (user) => { window.location.href = "index.html"; },
    () => {}
  );

  // Switch between login and signup tabs
  window.switchTab = function(tab) {
    currentTab = tab;
    document.getElementById("tab-login").classList.toggle("active", tab === "login");
    document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
    document.getElementById("username-field").style.display = tab === "signup" ? "block" : "none";
    document.getElementById("submit-btn").textContent = tab === "login" ? "Log in" : "Create account";
    document.getElementById("message").className = "message";
    document.getElementById("message").textContent = "";
  }

  // Handle the button click
  window.handleSubmit = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const username = document.getElementById("username").value.trim();
    const btn = document.getElementById("submit-btn");
    const msg = document.getElementById("message");

    // Basic validation
    if (!email || !password) {
      showMessage("Please fill in all fields.", "error");
      return;
    }
    if (currentTab === "signup" && !username) {
      showMessage("Please choose a username.", "error");
      return;
    }
    if (currentTab === "signup" && username.length < 3) {
      showMessage("Username must be at least 3 characters.", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Please wait...";

    const result = currentTab === "login"
      ? await login(email, password)
      : await signup(username, email, password);

    if (result.success) {
      showMessage("Success! Taking you to the site...", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    } else {
      showMessage(result.message, "error");
      btn.disabled = false;
      btn.textContent = currentTab === "login" ? "Log in" : "Create account";
    }
  }

  function showMessage(text, type) {
    const msg = document.getElementById("message");
    msg.textContent = text;
    msg.className = "message " + type;
  }
</script>

</body>
</html>
