<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com wss://*.firebaseio.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costume — Game Site</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 4px; flex-shrink: 0; }
    .sidebar .logo { font-size: 20px; font-weight: 700; color: #6c47ff; margin-bottom: 1.5rem; padding-left: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #aaa; transition: all 0.2s; text-decoration: none; }
    .nav-btn:hover { background: #252525; color: #fff; }
    .nav-btn.active { background: #6c47ff22; color: #6c47ff; font-weight: 500; }
    .nav-btn .icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-bottom { margin-top: auto; }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: #111; }
    .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: #6c47ff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .user-pill .name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { font-size: 12px; color: #555; cursor: pointer; }
    .logout-btn:hover { color: #ff6b6b; }
    .main { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 1.5rem; }
    .costume-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .preview-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .character { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; transition: background 0.3s; }
    .char-name { font-size: 16px; font-weight: 600; }
    .options-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 1.5rem; }
    .opt-section { margin-bottom: 1.5rem; }
    .opt-title { font-size: 13px; color: #888; font-weight: 500; margin-bottom: 10px; }
    .color-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .color-swatch.selected { border-color: #fff; }
    .emoji-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .emoji-btn { width: 44px; height: 44px; border-radius: 8px; background: #111; border: 2px solid transparent; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
    .emoji-btn.selected { border-color: #6c47ff; }
    .save-btn { width: 100%; background: #6c47ff; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 0.5rem; }
    .save-msg { font-size: 13px; color: #4caf50; margin-top: 8px; display: none; text-align: center; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">GameSite</div>
  <a href="index.html" class="nav-btn"><span class="icon">🎮</span> Games</a>
  <a href="dashboard.html" class="nav-btn"><span class="icon">📬</span> Dashboard</a>
  <a href="profile.html" class="nav-btn"><span class="icon">👤</span> Profile</a>
  <a href="costume.html" class="nav-btn active"><span class="icon">🎨</span> Costume</a>
  <a href="settings.html" class="nav-btn"><span class="icon">⚙️</span> Settings</a>
  <div class="sidebar-bottom">
    <div class="user-pill">
      <div class="avatar-sm" id="sidebar-avatar">?</div>
      <span class="name" id="sidebar-name">Loading...</span>
      <span class="logout-btn" onclick="handleLogout()">Out</span>
    </div>
  </div>
</div>
<div class="main">
  <p class="page-title">Costume editor</p>
  <div class="costume-layout">
    <div class="preview-card">
      <div class="character" id="char-preview" style="background:#6c47ff">😊</div>
      <p class="char-name" id="char-name-preview">Your character</p>
      <p style="font-size:13px;color:#555">This is how others see you</p>
    </div>
    <div class="options-card">
      <div class="opt-section">
        <p class="opt-title">Avatar color</p>
        <div class="color-row" id="color-row"></div>
      </div>
      <div class="opt-section">
        <p class="opt-title">Avatar emoji</p>
        <div class="emoji-row" id="emoji-row"></div>
      </div>
      <button class="save-btn" onclick="saveCostume()">Save costume</button>
      <p class="save-msg" id="save-msg">Costume saved!</p>
    </div>
  </div>
</div>

<script type="module">
  import { watchAuth, logout } from "./js/auth.js";
  import { setOnline } from "./js/presence.js";
  import { db } from "./js/firebase.js";
  import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const colors = ["#6c47ff","#e91e8c","#ff6b35","#00bcd4","#4caf50","#ffc107","#f44336","#607d8b"];
  const emojis = ["😊","😎","🎮","👾","🔥","⚡","🌟","💀","🐉","🦊","🐺","🎭"];

  let selectedColor = colors[0];
  let selectedEmoji = emojis[0];
  let currentUser = null;

  function buildColorRow() {
    const row = document.getElementById("color-row");
    colors.forEach(c => {
      const sw = document.createElement("div");
      sw.className = "color-swatch" + (c === selectedColor ? " selected" : "");
      sw.style.background = c;
      sw.onclick = () => {
        selectedColor = c;
        document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
        sw.classList.add("selected");
        document.getElementById("char-preview").style.background = c;
      };
      row.appendChild(sw);
    });
  }

  function buildEmojiRow() {
    const row = document.getElementById("emoji-row");
    emojis.forEach(e => {
      const btn = document.createElement("div");
      btn.className = "emoji-btn" + (e === selectedEmoji ? " selected" : "");
      btn.textContent = e;
      btn.onclick = () => {
        selectedEmoji = e;
        document.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        document.getElementById("char-preview").textContent = e;
      };
      row.appendChild(btn);
    });
  }

  watchAuth(async (user) => {
    currentUser = user;
    document.getElementById("sidebar-avatar").textContent = (user.displayName || "?")[0].toUpperCase();
    document.getElementById("sidebar-name").textContent = user.displayName || user.email;
    document.getElementById("char-name-preview").textContent = user.displayName || "Your character";
    await setOnline(user.uid);
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      if (data.costumeColor) {
        selectedColor = data.costumeColor;
        document.getElementById("char-preview").style.background = data.costumeColor;
      }
      if (data.costumeEmoji) {
        selectedEmoji = data.costumeEmoji;
        document.getElementById("char-preview").textContent = data.costumeEmoji;
      }
    }
    buildColorRow();
    buildEmojiRow();
  }, () => { window.location.href = "login.html"; });

  window.saveCostume = async function() {
    await updateDoc(doc(db, "users", currentUser.uid), {
      costumeColor: selectedColor,
      costumeEmoji: selectedEmoji
    });
    const msg = document.getElementById("save-msg");
    msg.style.display = "block";
    setTimeout(() => { msg.style.display = "none"; }, 2000);
  };

  window.handleLogout = logout;
</script>
</body>
</html>
